name: Build Kaitai for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pygame pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --noconsole --name Kaitai main.py

      - name: Copy assets
        run: xcopy /E /I assets dist\assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kaitai-Windows
          path: dist/